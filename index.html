document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-andes-lemon-900: #4f7317;\n\n  --andes-mint-100: #d9faf5;\n  --andes-mint-300: #95e7db;\n  --andes-mint-500: #52d1be;\n  --andes-mint-700: #0da38f;\n  --andes-mint-900: #006b5f;\n\n  --andes-peach-100: #ffdecc;\n  --andes-peach-300: #fbae8d;\n  --andes-peach-500: #e87054;\n  --andes-peach-700: #cf4a30;\n  --andes-peach-900: #872212;\n\n  --andes-rose-100: #ffe0f2;\n  --andes-rose-300: #ffabd1;\n  --andes-rose-500: #fa69a7;\n  --andes-rose-700: #db4084;\n  --andes-rose-900: #91114c;\n\n  --andes-sunflower-100: #fcf5c7;\n  --andes-sunflower-300: #ebd781;\n  --andes-sunflower-500: #d4ae33;\n  --andes-sunflower-700: #a88511;\n  --andes-sunflower-900: #5c4800;\n\n  --andes-violet-100: #f9ebff;\n  --andes-violet-500: #e986f1;\n  --andes-violet-700: #b93ebd;\n  --andes-violet-900: #6c0382;\n\n  --andes-white: #ffffff;\n  --andes-black: #282834;\n\n  --andes-white-alpha-10: rgba(255, 255, 255, 0.1);\n  --andes-white-alpha-40: rgba(255, 255, 255, 0.4);\n  --andes-white-alpha-70: rgba(255, 255, 255, 0.7);\n  --andes-white-alpha-90: rgba(255, 255, 255, 0.9);\n\n  --andes-black-alpha-10: rgba(40, 40, 52, 0.1);\n  --andes-black-alpha-30: rgba(40, 40, 52, 0.3);\n  --andes-black-alpha-60: rgba(40, 40, 52, 0.6);\n  --andes-black-alpha-80: rgba(40, 40, 52, 0.8);\n\n  /* ======================================================================\n   * SEMANTIC — Light mode surface, text, fill, feedback, interactive\n   * Reference names map to Andes X semantic tokens in andes-x.json.\n   * ====================================================================== */\n\n  /* Background */\n  --andes-bg-primary: var(--andes-white);\n  --andes-bg-secondary: var(--andes-gray-200);\n  --andes-bg-overlay: var(--andes-black-alpha-60);\n\n  /* Surfaces (cards, menus) */\n  --andes-surface-primary: var(--andes-white);\n  --andes-surface-primary-hover: var(--andes-gray-100);\n  --andes-surface-primary-active: var(--andes-gray-200);\n  --andes-surface-secondary: var(--andes-gray-100);\n  --andes-surface-secondary-hover: var(--andes-gray-200);\n  --andes-surface-elevated: var(--andes-white);\n\n  /* Text */\n  --andes-text-primary: var(--andes-gray-900);\n  --andes-text-secondary: var(--andes-gray-700);\n  --andes-text-accent: var(--andes-blue-700);\n  --andes-text-inverse: var(--andes-white);\n  --andes-text-disabled: var(--andes-gray-500);\n  --andes-text-link-idle: var(--andes-blue-700);\n  --andes-text-link-hover: var(--andes-blue-800);\n  --andes-text-link-active: var(--andes-blue-900);\n\n  /* Icon */\n  --andes-icon-primary: var(--andes-gray-900);\n  --andes-icon-secondary: var(--andes-gray-700);\n  --andes-icon-accent: var(--andes-blue-700);\n  --andes-icon-inverse: var(--andes-white);\n  --andes-icon-disabled: var(--andes-gray-500);\n\n  /* Borders */\n  --andes-border-primary: var(--andes-gray-300);\n  --andes-border-accent: var(--andes-blue-700);\n  --andes-border-disabled: var(--andes-gray-400);\n\n  /* Brand (Mercado-yellow + ink) */\n  --andes-brand-fill-loud: var(--andes-yellow-500);\n  --andes-brand-fill-quiet: var(--andes-yellow-300);\n  --andes-brand-on-fill: var(--andes-gray-900);\n\n  /* Interactive — loud = primary button */\n  --andes-interactive-loud-idle: var(--andes-blue-700);\n  --andes-interactive-loud-hover: var(--andes-blue-800);\n  --andes-interactive-loud-active: var(--andes-blue-900);\n  --andes-interactive-quiet-idle: var(--andes-blue-100);\n  --andes-interactive-quiet-hover: var(--andes-blue-200);\n  --andes-interactive-quiet-active: var(--andes-blue-300);\n  --andes-interactive-mute-hover: var(--andes-blue-100);\n  --andes-interactive-border-idle: var(--andes-gray-600);\n  --andes-interactive-border-hover: var(--andes-gray-700);\n  --andes-interactive-border-active: var(--andes-blue-700);\n\n  /* Feedback */\n  --andes-feedback-info-loud: var(--andes-blue-700);\n  --andes-feedback-info-quiet: var(--andes-blue-100);\n  --andes-feedback-positive-loud: var(--andes-green-700);\n  --andes-feedback-positive-quiet: var(--andes-green-100);\n  --andes-feedback-caution-loud: var(--andes-orange-700);\n  --andes-feedback-caution-quiet: var(--andes-orange-100);\n  --andes-feedback-negative-loud: var(--andes-red-700);\n  --andes-feedback-negative-quiet: var(--andes-red-100);\n  --andes-feedback-neutral-loud: var(--andes-gray-700);\n  --andes-feedback-neutral-quiet: var(--andes-gray-200);\n\n  /* ======================================================================\n   * TYPOGRAPHY — Inter as default, Proxima Nova reserved for ML-masthead\n   * Scale mirrors andes-x.json (font.size + font.lineHeight).\n   * ====================================================================== */\n  --andes-font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --andes-font-brand: 'Proxima Nova', 'Inter', -apple-system, sans-serif;\n\n  --andes-fw-regular: 400;\n  --andes-fw-semibold: 600;\n  --andes-fw-bold: 700;\n\n  /* Core size scale */\n  --andes-fs-10: 0.625rem;\n  --andes-fs-12: 0.75rem;\n  --andes-fs-14: 0.875rem;\n  --andes-fs-16: 1rem;\n  --andes-fs-18: 1.125rem;\n  --andes-fs-20: 1.25rem;\n  --andes-fs-24: 1.5rem;\n  --andes-fs-28: 1.75rem;\n  --andes-fs-32: 2rem;\n  --andes-fs-40: 2.5rem;\n  --andes-fs-48: 3rem;\n  --andes-fs-56: 3.5rem;\n\n  /* Semantic text roles (light-weight sugar over scale) */\n  --andes-body-xs: 400 0.625rem/0.75rem var(--andes-font-sans);\n  --andes-body-s: 400 0.75rem/1rem var(--andes-font-sans);\n  --andes-body-m: 400 0.875rem/1.125rem var(--andes-font-sans);\n  --andes-body-l: 400 1rem/1.25rem var(--andes-font-sans);\n\n  --andes-heading-s: 700 0.875rem/1.125rem var(--andes-font-sans);\n  --andes-heading-m: 700 1rem/1.25rem var(--andes-font-sans);\n  --andes-heading-l: 700 1.125rem/1.375rem var(--andes-font-sans);\n  --andes-heading-xl: 700 1.25rem/1.5rem var(--andes-font-sans);\n  --andes-heading-huge: 700 1.5rem/1.75rem var(--andes-font-sans);\n  --andes-heading-mega: 700 2rem/2.5rem var(--andes-font-sans);\n\n  --andes-display-xs: 700 2.5rem/3rem var(--andes-font-sans);\n  --andes-display-s: 700 3rem/3.5rem var(--andes-font-sans);\n  --andes-display-m: 700 3.5rem/4.125rem var(--andes-font-sans);\n\n  /* ======================================================================\n   * DIMENSIONS — Spacing / Radii / Sizing\n   * ====================================================================== */\n  --andes-space-0: 0px;\n  --andes-space-2: 2px;\n  --andes-space-4: 4px;\n  --andes-space-6: 6px;\n  --andes-space-8: 8px;\n  --andes-space-12: 12px;\n  --andes-space-16: 16px;\n  --andes-space-20: 20px;\n  --andes-space-24: 24px;\n  --andes-space-32: 32px;\n  --andes-space-40: 40px;\n  --andes-space-48: 48px;\n  --andes-space-56: 56px;\n  --andes-space-64: 64px;\n  --andes-space-72: 72px;\n  --andes-space-80: 80px;\n  --andes-space-88: 88px;\n\n  /* Semantic spacing aliases */\n  --andes-pad-pico: 2px;\n  --andes-pad-xnano: 4px;\n  --andes-pad-nano: 6px;\n  --andes-pad-xmicro: 8px;\n  --andes-pad-micro: 12px;\n  --andes-pad-xtiny: 16px;\n  --andes-pad-tiny: 20px;\n  --andes-pad-xsmall: 24px;\n  --andes-pad-small: 32px;\n  --andes-pad-medium: 40px;\n  --andes-pad-large: 48px;\n\n  /* Border radius scale */\n  --andes-radius-none: 0;\n  --andes-radius-tiny: 4px;\n  --andes-radius-xsmall: 6px;\n  --andes-radius-small: 8px;\n  --andes-radius-medium: 12px;\n  --andes-radius-large: 16px;\n  --andes-radius-xlarge: 20px;\n  --andes-radius-full: 9999px;\n\n  /* Container presets (cards) */\n  --andes-radius-container-default: 20px;\n  --andes-radius-container-compact: 12px;\n  /* Actions / inputs (buttons, fields) */\n  --andes-radius-action-default: 12px;\n  --andes-radius-action-compact: 8px;\n\n  /* Border widths */\n  --andes-border-width-small: 1px;\n  --andes-border-width-medium: 2px;\n  --andes-border-width-large: 3px;\n  --andes-border-width-xlarge: 4px;\n\n  /* Control heights (height == width for square controls) */\n  --andes-h-action-small: 32px;\n  --andes-h-action-medium: 40px;\n  --andes-h-action-large: 48px;\n  --andes-h-input-small: 32px;\n  --andes-h-input-medium: 40px;\n  --andes-h-input-large: 48px;\n\n  /* ======================================================================\n   * SHADOW — Low / High / Highlight (outline)\n   * ====================================================================== */\n  --andes-shadow-low:\n    0 -2px 4px 0 var(--andes-black-alpha-10),\n    0 2px 4px 0 var(--andes-black-alpha-10);\n  --andes-shadow-high:\n    0 -8px 12px 0 var(--andes-black-alpha-10),\n    0 8px 12px 0 var(--andes-black-alpha-10);\n  --andes-shadow-highlight-accent: 0 0 0 2px var(--andes-blue-200);\n  --andes-shadow-highlight-positive: 0 0 0 2px var(--andes-green-100);\n  --andes-shadow-highlight-caution: 0 0 0 2px var(--andes-orange-100);\n  --andes-shadow-highlight-negative: 0 0 0 2px var(--andes-red-100);\n\n  /* Glass */\n  --andes-glass-blur: 16px;\n  --andes-glass-color: var(--andes-white-alpha-70);\n}\n\n/* ======================================================================\n * DARK MODE — override semantics, primitives stay same\n * Apply via `data-andes-theme=\"dark\"` on <html> or any ancestor.\n * ====================================================================== */\n[data-andes-theme='dark'] {\n  --andes-dark-gray-100: #181820;\n  --andes-dark-gray-200: #1e1e29;\n  --andes-dark-gray-300: #20202c;\n  --andes-dark-gray-400: #292938;\n  --andes-dark-gray-500: #45455e;\n  --andes-dark-gray-600: #6d6d8d;\n  --andes-dark-gray-700: #a3a3bd;\n  --andes-dark-gray-800: #c8c8da;\n  --andes-dark-gray-900: #dedfed;\n\n  --andes-bg-primary: var(--andes-dark-gray-100);\n  --andes-bg-secondary: var(--andes-dark-gray-400);\n  --andes-bg-overlay: rgba(4, 4, 7, 0.8);\n\n  --andes-surface-primary: var(--andes-dark-gray-100);\n  --andes-surface-primary-hover: var(--andes-dark-gray-200);\n  --andes-surface-primary-active: var(--andes-dark-gray-300);\n  --andes-surface-secondary: var(--andes-dark-gray-300);\n  --andes-surface-secondary-hover: var(--andes-dark-gray-400);\n  --andes-surface-elevated: var(--andes-dark-gray-200);\n\n  --andes-text-primary: var(--andes-white);\n  --andes-text-secondary: var(--andes-dark-gray-700);\n  --andes-text-disabled: var(--andes-dark-gray-600);\n\n  --andes-border-primary: var(--andes-dark-gray-500);\n  --andes-border-disabled: var(--andes-dark-gray-500);\n}\n\n/* ======================================================================\n * Base element resets — optional, opinionated\n * ====================================================================== */\n.andes-base {\n  font: var(--andes-body-m);\n  color: var(--andes-text-primary);\n  background: var(--andes-bg-primary);\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<style>/* Folder Caixas KLT — single page A4 portrait\n   Layout inspired by the ML \"Comunicação Semanal\" template */\n\n:root {\n  --paper: #fffaea;          /* pale cream */\n  --paper-edge: #fff3c8;\n  --ink: #0c2e6a;            /* deep navy used in the print */\n  --ink-soft: #1f3f7e;\n  --pill-yellow: #ffe600;\n  --card-yellow: #fff5b8;    /* soft butter yellow card */\n  --card-blue: #d9ebff;      /* powder blue card */\n  --rule: #b5cff0;\n  --bullet: #ffd400;\n  --foot-blue: #c9def7;\n}\n\n@page {\n  size: A4 portrait;\n  margin: 0;\n}\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: #ece9e1;\n  font-family: 'Inter', system-ui, sans-serif;\n  -webkit-font-smoothing: antialiased;\n}\nbody {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n  padding: 24px;\n  box-sizing: border-box;\n}\n\n/* ===== Page ===== */\n.folder-page {\n  width: 794px;\n  height: 1123px;\n  position: relative;\n  overflow: hidden;\n  background: var(--paper);\n  color: var(--ink);\n  box-shadow: 0 12px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);\n  box-sizing: border-box;\n  padding: 36px 56px 36px;\n  display: flex;\n  flex-direction: column;\n}\n\n/* Decorative dot pattern around edges */\n.bg-dots {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  background-image:\n    radial-gradient(circle at center, rgba(58,121,194,0.22) 1.6px, transparent 2px);\n  background-size: 14px 14px;\n  /* Visible only in border ribbon (mask out center) */\n  mask-image: radial-gradient(ellipse 56% 64% at 50% 52%, transparent 60%, #000 84%);\n  -webkit-mask-image: radial-gradient(ellipse 56% 64% at 50% 52%, transparent 60%, #000 84%);\n  z-index: 0;\n}\n.folder-page > * { position: relative; z-index: 1; }\n\n/* ===== Ribbon header ===== */\n.ribbon {\n  position: relative;\n  margin: 4px auto 12px;\n  width: 460px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n}\n.ribbon-body {\n  position: relative;\n  background: var(--pill-yellow);\n  padding: 14px 36px 16px;\n  border-radius: 8px;\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  box-shadow: 0 4px 0 #e6cf00;\n  z-index: 2;\n}\n.ribbon-body::before,\n.ribbon-body::after {\n  /* Ribbon tails */\n  content: \"\";\n  position: absolute;\n  top: 8px;\n  width: 60px;\n  height: 30px;\n  background: #f9c200;\n  z-index: -1;\n}\n.ribbon-body::before {\n  left: -50px;\n  clip-path: polygon(0 0, 100% 0, 100% 100%, 16px 100%, 0 50%);\n}\n.ribbon-body::after {\n  right: -50px;\n  clip-path: polygon(0 0, 100% 0, 100% 50%, calc(100% - 16px) 100%, 0 100%);\n}\n.ribbon-fold {\n  position: absolute;\n  width: 14px;\n  height: 12px;\n  background: #cca300;\n  top: 38px;\n}\n.ribbon-fold.left { left: -50px; clip-path: polygon(0 0, 100% 0, 100% 100%); }\n.ribbon-fold.right { right: -50px; clip-path: polygon(0 0, 100% 0, 0 100%); }\n\n.ml-mark {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n}\n.ml-mark img { display: block; }\n.ribbon-body .ml-mark img { width: 150px; }\n\n.week-pill {\n  margin-top: -2px;\n  background: var(--ink);\n  color: #fff;\n  font: 700 13px/1 'Inter', sans-serif;\n  letter-spacing: 0.06em;\n  padding: 8px 22px 9px;\n  border-radius: 999px;\n  z-index: 3;\n  position: relative;\n  text-transform: uppercase;\n  box-shadow: 0 3px 0 rgba(0,0,0,0.18);\n}\n\n/* ===== Big title ===== */\n.folder-title {\n  text-align: center;\n  font: 800 24px/1.15 'Inter', sans-serif;\n  letter-spacing: 0.02em;\n  color: var(--ink);\n  margin: 14px 0 18px;\n  text-transform: uppercase;\n}\n\n/* ===== Cards ===== */\n.cards {\n  list-style: none;\n  margin: 0;\n  padding: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  flex: 1;\n}\n.card {\n  position: relative;\n  border-radius: 18px;\n  padding: 14px 18px;\n  display: grid;\n  grid-template-columns: 80px 1fr 80px;\n  align-items: center;\n  gap: 14px;\n  min-height: 92px;\n  box-shadow: 0 2px 0 rgba(0,0,0,0.05);\n}\n.card.yellow { background: var(--card-yellow); }\n.card.blue   { background: var(--card-blue); }\n\n.card .icon {\n  width: 80px;\n  height: 80px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.card .icon svg {\n  width: 100%;\n  height: 100%;\n  display: block;\n}\n.card .text {\n  min-width: 0;\n}\n.card h3 {\n  font: 800 14px/1.15 'Inter', sans-serif;\n  letter-spacing: 0.04em;\n  color: var(--ink);\n  margin: 0 0 6px;\n  text-transform: uppercase;\n}\n.card .desc {\n  font: 500 12.5px/1.4 'Inter', sans-serif;\n  color: var(--ink);\n  margin: 0;\n  display: grid;\n  grid-template-columns: 18px 1fr;\n  gap: 6px;\n  align-items: start;\n}\n.card .desc::before {\n  content: \"\";\n  display: inline-block;\n  width: 14px;\n  height: 14px;\n  border-radius: 50%;\n  background: var(--bullet);\n  margin-top: 2px;\n  background-image: linear-gradient(135deg, transparent 47%, var(--ink) 47% 53%, transparent 53%);\n  position: relative;\n}\n.card .desc-text { display: block; }\n.card .desc strong { font-weight: 700; }\n\n/* Connecting curl between cards */\n.card + .card::before {\n  content: \"\";\n  position: absolute;\n  left: -8px;\n  top: -16px;\n  width: 36px;\n  height: 30px;\n  border: 2px dashed rgba(12,46,106,0.45);\n  border-right: none;\n  border-bottom: none;\n  border-top-left-radius: 18px;\n  pointer-events: none;\n}\n\n/* QR card variant — first card has QR on right */\n.card .qr-slot {\n  width: 80px;\n  height: 80px;\n  background: #fff;\n  border: 1.5px solid var(--ink);\n  border-radius: 8px;\n  padding: 4px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.card .qr-slot svg,\n.card .qr-slot img {\n  width: 100%;\n  height: 100%;\n  display: block;\n}\n.card .qr-cap {\n  position: absolute;\n  bottom: -8px;\n  right: 14px;\n  background: var(--ink);\n  color: #fff;\n  font: 700 8px/1 'Inter', sans-serif;\n  letter-spacing: 0.12em;\n  padding: 4px 8px;\n  border-radius: 999px;\n  text-transform: uppercase;\n}\n\n/* ===== Clickable link bar ===== */\n.link-bar {\n  display: grid;\n  grid-template-columns: 38px 1fr auto;\n  gap: 14px;\n  align-items: center;\n  background: var(--ink);\n  color: #fff;\n  text-decoration: none;\n  border-radius: 14px;\n  padding: 12px 18px;\n  margin: 14px 0 0;\n  box-shadow: 0 2px 0 rgba(0,0,0,0.12);\n  transition: transform .15s ease;\n}\n.link-bar:hover { transform: translateY(-1px); }\n.link-bar-icon {\n  width: 38px; height: 38px;\n  background: var(--pill-yellow);\n  color: var(--ink);\n  border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n}\n.link-bar-icon svg { width: 20px; height: 20px; }\n.link-bar-text { display: flex; flex-direction: column; min-width: 0; }\n.link-bar-text small {\n  font: 700 9px/1 'Inter', sans-serif;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  color: var(--pill-yellow);\n  margin-bottom: 4px;\n}\n.link-bar-url {\n  font: 600 11px/1.3 'Inter', sans-serif;\n  color: #fff;\n  word-break: break-all;\n  letter-spacing: -0.005em;\n}\n.link-bar-cta {\n  background: var(--pill-yellow);\n  color: var(--ink);\n  font: 800 11px/1 'Inter', sans-serif;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  padding: 9px 14px;\n  border-radius: 999px;\n  white-space: nowrap;\n}\n\n/* ===== Footer ===== */\n.folder-foot {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 14px 0 0;\n  font: 700 11px/1 'Inter', sans-serif;\n  color: var(--ink);\n}\n.folder-foot .ml-mark img { width: 110px; }\n.folder-foot .hashtag {\n  letter-spacing: 0.02em;\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body style=\"background-color: rgb(230, 230, 230)\">\n<main class=\"folder-page\" data-screen-label=\"Folder Caixas KLT\">\n\n  <div class=\"bg-dots\"><\u002Fdiv>\n\n  <!-- Ribbon -->\n  <header class=\"ribbon\">\n    <span class=\"ribbon-fold left\"><\u002Fspan>\n    <span class=\"ribbon-fold right\"><\u002Fspan>\n    <div class=\"ribbon-body\">\n      <span class=\"ml-mark\"><img src=\"042f0562-715c-4127-ad50-f2c20845e01a\" alt=\"Mercado Libre\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"week-pill\">FLUXO: KLT&nbsp;·&nbsp;INSUMOS<\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Big title -->\n  <h1 class=\"folder-title\">Abastecimento de Caixas KLT nas Linhas<\u002Fh1>\n\n  <!-- Cards -->\n  <ol class=\"cards\">\n\n    <!-- Step 1 — solicitar formulário, com QR -->\n    <li class=\"card yellow\">\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- Clipboard / form -->\n          <rect x=\"14\" y=\"14\" width=\"44\" height=\"56\" rx=\"4\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <rect x=\"22\" y=\"10\" width=\"28\" height=\"10\" rx=\"3\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <line x1=\"22\" y1=\"32\" x2=\"50\" y2=\"32\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"22\" y1=\"40\" x2=\"46\" y2=\"40\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"22\" y1=\"48\" x2=\"50\" y2=\"48\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"58\" cy=\"58\" r=\"14\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Fcircle>\n          <path d=\"M52 58 L 56 62 L 64 54\" stroke=\"#0c2e6a\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"text\">\n        <h3>Solicitar formulário ao TL de insumos<\u002Fh3>\n        <p class=\"desc\"><span class=\"desc-text\">Antes de qualquer abastecimento, peça ao <strong>TL de insumos<\u002Fstrong> o formulário de requisição — escaneie o QR para abrir.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <a class=\"qr-slot\" id=\"qr-target\" href=\"https://docs.google.com/forms/d/e/1FAIpQLSc_J40DgnoZOXX2WRx9pHfc63E2xYWpiNUU2iRz638e2tFV2w/viewform\" target=\"_blank\" rel=\"noopener\" aria-label=\"QR para o formulário\"><\u002Fa>\n      <span class=\"qr-cap\">Formulário<\u002Fspan>\n    <\u002Fli>\n\n    <!-- Step 2 — validar insumos -->\n    <li class=\"card blue\">\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- Magnifier over a checklist -->\n          <rect x=\"14\" y=\"16\" width=\"40\" height=\"50\" rx=\"4\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <line x1=\"22\" y1=\"28\" x2=\"46\" y2=\"28\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"22\" y1=\"38\" x2=\"40\" y2=\"38\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"22\" y1=\"48\" x2=\"46\" y2=\"48\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"22\" y1=\"58\" x2=\"36\" y2=\"58\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"56\" cy=\"50\" r=\"14\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Fcircle>\n          <line x1=\"65\" y1=\"60\" x2=\"72\" y2=\"68\" stroke=\"#0c2e6a\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fline>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"text\">\n        <h3>Validar insumos faltantes<\u002Fh3>\n        <p class=\"desc\"><span class=\"desc-text\">Confira quais insumos estão <strong>faltando ou precisam ser repostos<\u002Fstrong> nas caixas KLT.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <rect x=\"20\" y=\"22\" width=\"40\" height=\"40\" rx=\"4\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <line x1=\"20\" y1=\"36\" x2=\"60\" y2=\"36\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Fline>\n          <line x1=\"40\" y1=\"22\" x2=\"40\" y2=\"62\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Fline>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fli>\n\n    <!-- Step 3 — local + autorização -->\n    <li class=\"card yellow\">\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- Pin -->\n          <path d=\"M40 12 C 26 12, 18 22, 18 34 C 18 50, 40 70, 40 70 C 40 70, 62 50, 62 34 C 62 22, 54 12, 40 12 Z\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpath>\n          <circle cx=\"40\" cy=\"32\" r=\"8\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"text\">\n        <h3>Identificar local e autorização<\u002Fh3>\n        <p class=\"desc\"><span class=\"desc-text\">Identifique o <strong>local de retirada<\u002Fstrong> e busque o responsável para autorizar a liberação dos insumos.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- Key -->\n          <circle cx=\"28\" cy=\"40\" r=\"14\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Fcircle>\n          <circle cx=\"28\" cy=\"40\" r=\"5\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2\"><\u002Fcircle>\n          <rect x=\"40\" y=\"36\" width=\"32\" height=\"8\" rx=\"2\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <rect x=\"58\" y=\"44\" width=\"6\" height=\"8\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <rect x=\"66\" y=\"44\" width=\"6\" height=\"6\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fli>\n\n    <!-- Step 4 — retirar e abastecer na RK -->\n    <li class=\"card blue\">\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- KLT crate -->\n          <rect x=\"14\" y=\"22\" width=\"52\" height=\"40\" rx=\"4\" fill=\"#2685eb\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <rect x=\"14\" y=\"22\" width=\"52\" height=\"8\" fill=\"#0c2e6a\"><\u002Frect>\n          <rect x=\"20\" y=\"34\" width=\"6\" height=\"22\" fill=\"rgba(255,255,255,0.4)\" rx=\"1\"><\u002Frect>\n          <rect x=\"32\" y=\"34\" width=\"6\" height=\"22\" fill=\"rgba(255,255,255,0.4)\" rx=\"1\"><\u002Frect>\n          <rect x=\"44\" y=\"34\" width=\"6\" height=\"22\" fill=\"rgba(255,255,255,0.4)\" rx=\"1\"><\u002Frect>\n          <rect x=\"56\" y=\"34\" width=\"6\" height=\"22\" fill=\"rgba(255,255,255,0.4)\" rx=\"1\"><\u002Frect>\n          <rect x=\"32\" y=\"56\" width=\"16\" height=\"4\" rx=\"2\" fill=\"rgba(0,0,0,0.4)\"><\u002Frect>\n          <!-- Arrow -->\n          <path d=\"M68 14 L 74 22 L 68 30\" fill=\"none\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"text\">\n        <h3>Retirar caixa e abastecer na RK<\u002Fh3>\n        <p class=\"desc\"><span class=\"desc-text\">Retire a caixa KLT e leve até a <strong>área de RK<\u002Fstrong>, onde o responsável de insumos faz o abastecimento.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"icon\">\n        <svg viewBox=\"0 0 80 80\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- Factory / line -->\n          <rect x=\"14\" y=\"36\" width=\"52\" height=\"30\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\"><\u002Frect>\n          <path d=\"M30 36 L 30 24 L 44 30 L 44 24 L 58 30 L 58 36\" fill=\"#fff\" stroke=\"#0c2e6a\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpath>\n          <rect x=\"20\" y=\"48\" width=\"10\" height=\"14\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2\"><\u002Frect>\n          <rect x=\"34\" y=\"48\" width=\"10\" height=\"14\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2\"><\u002Frect>\n          <rect x=\"48\" y=\"48\" width=\"10\" height=\"14\" fill=\"#ffe600\" stroke=\"#0c2e6a\" stroke-width=\"2\"><\u002Frect>\n          <text x=\"40\" y=\"60\" text-anchor=\"middle\" font-family=\"Inter, sans-serif\" font-weight=\"700\" font-size=\"9\" fill=\"#0c2e6a\">RK<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fli>\n  <\u002Fol>\n\n  <!-- Clickable link bar -->\n  <a class=\"link-bar\" href=\"https://docs.google.com/forms/d/e/1FAIpQLSc_J40DgnoZOXX2WRx9pHfc63E2xYWpiNUU2iRz638e2tFV2w/viewform\" target=\"_blank\" rel=\"noopener\" aria-label=\"Abrir formulário de requisição\">\n    <span class=\"link-bar-icon\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M10 14a4 4 0 0 0 5.66 0l3-3a4 4 0 0 0-5.66-5.66l-1.5 1.5\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M14 10a4 4 0 0 0-5.66 0l-3 3a4 4 0 0 0 5.66 5.66l1.5-1.5\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fspan>\n    <span class=\"link-bar-text\">\n      <small>Clique ou copie o link do formulário<\u002Fsmall>\n      <span class=\"link-bar-url\">docs.google.com/forms/d/e/1FAIpQLSc_J40DgnoZOXX2WRx9pHfc63E2xYWpiNUU2iRz638e2tFV2w/viewform<\u002Fspan>\n    <\u002Fspan>\n    <span class=\"link-bar-cta\">Abrir →<\u002Fspan>\n  <\u002Fa>\n\n  <!-- Footer -->\n  <footer class=\"folder-foot\">\n    <span class=\"hashtag\">#OperaçõesInsumos<\u002Fspan>\n    <span class=\"ml-mark\"><img src=\"042f0562-715c-4127-ad50-f2c20845e01a\" alt=\"Mercado Libre\"><\u002Fspan>\n    <span class=\"hashtag\">#EquipeMercadoLivre<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n<script src=\"7d4f9c25-6076-4535-8151-080364df45d4\"><\u002Fscript>\n<script>\n(function(){\n  const url = \"https://docs.google.com/forms/d/e/1FAIpQLSc_J40DgnoZOXX2WRx9pHfc63E2xYWpiNUU2iRz638e2tFV2w/viewform\";\n  try {\n    const qr = qrcode(0, 'M');\n    qr.addData(url);\n    qr.make();\n    document.getElementById('qr-target').innerHTML = qr.createSvgTag({ scalable: true, margin: 0 });\n    const svg = document.querySelector('#qr-target svg');\n    if (svg) {\n      svg.setAttribute('width', '100%');\n      svg.setAttribute('height', '100%');\n      svg.setAttribute('shape-rendering', 'crispEdges');\n    }\n  } catch (e) {\n    console.error('QR generation failed:', e);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
